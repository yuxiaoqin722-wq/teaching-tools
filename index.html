<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JIAOHANYU 教学活动库</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-1: #f6fbf8;
      --bg-2: #eef7f2;
      --mist: rgba(255,255,255,0.68);
      --ink: #213a35;
      --ink-soft: #5f7f76;
      --line: rgba(117, 159, 145, 0.22);
      --tag-bg: rgba(238, 247, 242, 0.92);
      --green-1: #a9dcc7;
      --green-2: #76bea2;
      --green-3: #5da98d;
      --shadow-1: rgba(84, 126, 112, 0.08);
      --shadow-2: rgba(84, 126, 112, 0.14);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(181, 221, 206, 0.50), transparent 28%),
        radial-gradient(circle at 84% 16%, rgba(200, 230, 218, 0.42), transparent 30%),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.58), transparent 35%),
        linear-gradient(180deg, #f8fcfa 0%, #eef7f2 55%, #ecf5f0 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 20% 75%, rgba(150, 185, 170, 0.12), transparent 26%),
        radial-gradient(ellipse at 80% 78%, rgba(145, 180, 165, 0.10), transparent 28%),
        radial-gradient(ellipse at 55% 88%, rgba(130, 165, 150, 0.08), transparent 34%);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: -40px;
      height: 220px;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 18% 100%, rgba(122, 157, 143, 0.10), transparent 34%),
        radial-gradient(ellipse at 48% 100%, rgba(122, 157, 143, 0.11), transparent 36%),
        radial-gradient(ellipse at 82% 100%, rgba(122, 157, 143, 0.09), transparent 34%);
      z-index: 0;
      filter: blur(2px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(248, 252, 249, 0.78);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(120, 162, 148, 0.12);
    }

    .topbar-inner {
      max-width: 1240px;
      margin: auto;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      object-fit: cover;
      background: #fff;
      box-shadow:
        0 8px 18px rgba(98, 143, 127, 0.12),
        0 2px 6px rgba(98, 143, 127, 0.06);
    }

    .brand-text {
      font-weight: 900;
      font-size: 19px;
      letter-spacing: 0.08em;
      color: #345b53;
    }

    .top-search input {
      width: 320px;
      max-width: 100%;
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(148, 186, 173, 0.28);
      padding: 0 15px;
      outline: none;
      font-size: 14px;
      background: rgba(255,255,255,0.82);
      color: #355c54;
      transition: all 0.2s ease;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }

    .top-search input:focus {
      border-color: #90c9b4;
      box-shadow: 0 0 0 4px rgba(144, 201, 180, 0.16);
    }

    .container {
      max-width: 1240px;
      margin: auto;
      padding: 42px 24px 56px;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 34px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 50px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.04;
      color: #274940;
      text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    }

    .hero-desc {
      margin: 0;
      font-size: 14px;
      color: #7a968d;
      letter-spacing: 0.12em;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 18px;
    }

    .toolbar button {
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(151, 191, 176, 0.28);
      background: rgba(255,255,255,0.72);
      color: #365e55;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.22s ease;
      box-shadow: 0 4px 12px rgba(110, 149, 135, 0.04);
    }

    .toolbar button:hover {
      background: rgba(255,255,255,0.92);
      border-color: rgba(134, 183, 164, 0.45);
      transform: translateY(-1px);
    }

    .toolbar button.active {
      background: linear-gradient(180deg, #b7e1d0 0%, #95d0b8 100%);
      border-color: rgba(129, 188, 165, 0.45);
      color: #21463d;
      box-shadow:
        0 10px 20px rgba(122, 183, 157, 0.20),
        0 2px 6px rgba(122, 183, 157, 0.10);
    }

    .stats {
      text-align: center;
      font-size: 13px;
      color: #718c83;
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 26px;
    }

    .card {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(252,255,253,0.80));
      box-shadow:
        0 18px 38px var(--shadow-1),
        0 6px 14px rgba(84, 126, 112, 0.04);
      transition: transform 0.24s ease, box-shadow 0.24s ease;
      backdrop-filter: blur(8px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: 1px;
      background:
        linear-gradient(
          145deg,
          rgba(116, 152, 138, 0.34),
          rgba(212, 233, 223, 0.10),
          rgba(127, 164, 150, 0.18),
          rgba(225, 239, 232, 0.08)
        );
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 45%);
      mix-blend-mode: screen;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow:
        0 26px 52px var(--shadow-2),
        0 10px 24px rgba(84, 126, 112, 0.08);
    }

    .card-cover {
      width: 100%;
      height: 228px;
      object-fit: cover;
      display: block;
      background: #e6f0eb;
    }

    .card-body {
      padding: 18px 18px 18px;
      text-align: left;
    }

    .card-title {
      font-size: 23px;
      font-weight: 900;
      margin: 0 0 12px;
      line-height: 1.28;
      color: #26493f;
      letter-spacing: -0.02em;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      min-height: 24px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .tag {
      background: rgba(237, 246, 241, 0.92);
      color: #4d7067;
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(197, 223, 213, 0.72);
      white-space: nowrap;
    }

    .author {
      flex-shrink: 0;
      font-size: 12px;
      color: #78938b;
      font-weight: 700;
      white-space: nowrap;
      margin-left: auto;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: none;
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .open {
      height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #9ad7bf 0%, #74bea1 100%);
      color: #173c34;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      box-shadow:
        0 10px 22px rgba(116, 190, 161, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .open:hover {
      transform: translateY(-1px);
      background: linear-gradient(180deg, #8fd1b8 0%, #68b597 100%);
    }

    .download {
      width: 48px;
      height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(240, 247, 243, 0.95);
      color: #4c7268;
      border: 1px solid rgba(210, 229, 220, 0.85);
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(80, 118, 105, 0.04);
    }

    .download:hover {
      background: #eaf4ef;
      transform: translateY(-1px);
    }

    .empty {
      display: none;
      text-align: center;
      color: #6b8d83;
      font-size: 15px;
      padding: 30px 0;
    }

    @media (max-width: 768px) {
      .topbar-inner,
      .container {
        padding-left: 16px;
        padding-right: 16px;
      }

      .top-search {
        width: 100%;
      }

      .top-search input {
        width: 100%;
      }

      h1 {
        font-size: 36px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card-cover {
        height: 230px;
      }

      .meta-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .author {
        margin-left: 0;
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="assets/jiaohanyu-logo.jpg" class="brand-logo" alt="JIAOHANYU Logo">
      <div class="brand-text">JIAOHANYU</div>
    </div>
    <div class="top-search">
      <input id="searchInput" placeholder="搜索工具名称 / 学科 / 作者...">
    </div>
  </div>
</div>

<div class="container">

  <div class="hero">
    <h1>教学活动库</h1>
    <div class="hero-desc">青山入卷 · 温润而学</div>
  </div>

  <div class="toolbar" id="toolbar"></div>

  <div class="stats" id="stats"></div>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty">没有找到相关活动</div>

</div>

<script>
let data = [];
let currentTag = "全部";

fetch("data.json")
  .then(res => res.json())
  .then(d => {
    data = Array.isArray(d) ? d.filter(item => item.hidden !== true) : [];
    renderToolbar();
    render();
  })
  .catch(err => {
    console.error(err);
    document.getElementById("stats").innerText = "加载失败，请检查 data.json 是否存在且格式正确";
    document.getElementById("empty").style.display = "block";
  });

document.getElementById("searchInput").addEventListener("input", render);

function getAllTags() {
  const tagSet = new Set();

  data.forEach(item => {
    (item.tags || []).forEach(tag => tagSet.add(tag));
  });

  const preferredOrder = [
    "词汇",
    "语法",
    "汉字",
    "书写",
    "听力",
    "口语",
    "阅读",
    "游戏",
    "HSK1",
    "HSK2",
    "词语"
  ];

  const ordered = preferredOrder.filter(tag => tagSet.has(tag));
  const extra = Array.from(tagSet).filter(tag => !preferredOrder.includes(tag));

  return ["全部", ...ordered, ...extra];
}

function renderToolbar() {
  const tags = getAllTags();

  document.getElementById("toolbar").innerHTML = tags.map(tag => `
    <button
      class="${tag === currentTag ? 'active' : ''}"
      onclick="filterTag('${tag}')"
    >
      ${tag}
    </button>
  `).join("");
}

function filterTag(tag) {
  currentTag = tag;
  renderToolbar();
  render();
}

function render() {
  const keyword = document.getElementById("searchInput").value.toLowerCase().trim();

  const list = data.filter(item => {
    const tags = item.tags || [];
    const title = (item.title || "").toLowerCase();
    const author = (item.author || "").toLowerCase();
    const tagText = tags.join(" ").toLowerCase();

    const matchTag = currentTag === "全部" || tags.includes(currentTag);
    const matchSearch =
      title.includes(keyword) ||
      author.includes(keyword) ||
      tagText.includes(keyword);

    return matchTag && matchSearch;
  });

  document.getElementById("stats").innerText = `共 ${data.length} 个活动 · 当前 ${list.length}`;

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  if (list.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  grid.innerHTML = list.map(item => `
    <div class="card">
      <img src="${item.cover}" class="card-cover" alt="${item.title}">
      <div class="card-body">
        <div class="card-title">${item.title}</div>

        <div class="meta-row">
          <div class="tags">
            ${(item.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
          </div>
          <div class="author">${item.author || "未填写"}</div>
        </div>

        <div class="buttons">
          <a class="btn open" href="${item.path}" target="_blank">打开</a>
          <a class="btn download" href="${item.path}" download title="下载">↓</a>
        </div>
      </div>
    </div>
  `).join("");
}
</script>

</body>
</html>

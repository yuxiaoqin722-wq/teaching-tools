<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COLESSON教学活动库</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      background: #f7f8fb;
      color: #111827;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #eceff3;
      z-index: 20;
    }

    .topbar-inner {
      max-width: 1240px;
      margin: auto;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
    }

    .brand-text {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.01em;
    }

    .top-search input {
      width: 320px;
      max-width: 100%;
      height: 44px;
      border-radius: 12px;
      border: 1px solid #d8dde6;
      padding: 0 14px;
      outline: none;
      font-size: 14px;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .top-search input:focus {
      border-color: #7ecf6f;
      box-shadow: 0 0 0 4px rgba(126, 207, 111, 0.14);
    }

    .container {
      max-width: 1240px;
      margin: auto;
      padding: 40px 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 34px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #0f172a;
    }

    .hero-desc {
      margin: 0;
      font-size: 14px;
      color: #9ca3af;
      letter-spacing: 0.02em;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
    }

    .toolbar button {
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid #d7dce4;
      background: #fff;
      color: #111827;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .toolbar button:hover {
      background: #fbfbfc;
      border-color: #c8d0db;
    }

    .toolbar button.active {
      background: #8fdc78;
      border-color: #8fdc78;
      box-shadow: 0 8px 18px rgba(143, 220, 120, 0.24);
    }

    .stats {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px,1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #eceff3;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.08);
    }

    .card-cover {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: #eef2f7;
    }

    .card-body {
      padding: 16px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 10px;
      line-height: 1.3;
    }

    .author {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag {
      background: #f3f6fa;
      color: #4b5563;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      height: 40px;
      border-radius: 10px;
      text-align: center;
      line-height: 40px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .open {
      background: #7bd35f;
      color: #0f172a;
    }

    .open:hover {
      background: #70cb54;
    }

    .download {
      background: #f3f4f6;
      color: #111827;
    }

    .download:hover {
      background: #e8ebf0;
    }

    .empty {
      display: none;
      text-align: center;
      color: #6b7280;
      font-size: 15px;
      padding: 30px 0;
    }

    @media (max-width: 768px) {
      .topbar-inner,
      .container {
        padding-left: 16px;
        padding-right: 16px;
      }

      .top-search {
        width: 100%;
      }

      .top-search input {
        width: 100%;
      }

      h1 {
        font-size: 34px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="assets/colesson-logo.jpg" class="brand-logo" alt="CoLesson Logo">
      <div class="brand-text">COLESSON</div>
    </div>
    <div class="top-search">
      <input id="searchInput" placeholder="搜索工具名称 / 学科 / 作者...">
    </div>
  </div>
</div>

<div class="container">

  <div class="hero">
    <h1>教学活动库</h1>
    <div class="hero-desc">搜索并使用教学活动</div>
  </div>

  <div class="toolbar" id="toolbar"></div>

  <div class="stats" id="stats"></div>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty">没有找到相关活动</div>

</div>

<script>
let data = [];
let currentTag = "全部";

fetch("data.json")
  .then(res => res.json())
  .then(d => {
    data = d;
    renderToolbar();
    render();
  })
  .catch(err => {
    console.error(err);
    document.getElementById("stats").innerText = "加载失败，请检查 data.json 是否存在且格式正确";
    document.getElementById("empty").style.display = "block";
  });

document.getElementById("searchInput").addEventListener("input", render);

function getAllTags() {
  const tagSet = new Set();

  data.forEach(item => {
    (item.tags || []).forEach(tag => tagSet.add(tag));
  });

  const preferredOrder = [
    "词汇",
    "语法",
    "汉字",
    "书写",
    "听力",
    "口语",
    "阅读",
    "游戏",
    "HSK1",
    "HSK2"
  ];

  const ordered = preferredOrder.filter(tag => tagSet.has(tag));
  const extra = Array.from(tagSet).filter(tag => !preferredOrder.includes(tag));

  return ["全部", ...ordered, ...extra];
}

function renderToolbar() {
  const tags = getAllTags();

  document.getElementById("toolbar").innerHTML = tags.map(tag => `
    <button
      class="${tag === currentTag ? 'active' : ''}"
      onclick="filterTag('${tag}')"
    >
      ${tag}
    </button>
  `).join("");
}

function filterTag(tag) {
  currentTag = tag;
  renderToolbar();
  render();
}

function render() {
  const keyword = document.getElementById("searchInput").value.toLowerCase().trim();

  const list = data.filter(item => {
    const tags = item.tags || [];
    const title = (item.title || "").toLowerCase();
    const author = (item.author || "").toLowerCase();
    const tagText = tags.join(" ").toLowerCase();

    const matchTag = currentTag === "全部" || tags.includes(currentTag);
    const matchSearch =
      title.includes(keyword) ||
      author.includes(keyword) ||
      tagText.includes(keyword);

    return matchTag && matchSearch;
  });

  document.getElementById("stats").innerText = `共 ${data.length} 个活动 · 当前 ${list.length}`;

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  if (list.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  grid.innerHTML = list.map(item => `
    <div class="card">
      <img src="${item.cover}" class="card-cover" alt="${item.title}">
      <div class="card-body">
        <div class="card-title">${item.title}</div>
        <div class="author">● ${item.author || "未知作者"}</div>
        <div class="tags">
          ${(item.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
        </div>
        <div class="buttons">
          <a class="btn open" href="${item.path}" target="_blank">打开</a>
          <a class="btn download" href="${item.path}" download>下载</a>
        </div>
      </div>
    </div>
  `).join("");
}
</script>

</body>
</html>

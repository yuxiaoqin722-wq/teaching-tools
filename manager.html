<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教学活动管理工具</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      background: #f6f7fb;
      color: #111827;
      padding: 24px 16px;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 38px;
      font-weight: 900;
    }

    .desc {
      color: #6b7280;
      margin-bottom: 22px;
      line-height: 1.8;
      font-size: 15px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 26px 0 14px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid #d8dde6;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    input:focus, textarea:focus {
      border-color: #7ecf6f;
      box-shadow: 0 0 0 4px rgba(126, 207, 111, 0.14);
    }

    .path-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .path-prefix,
    .path-suffix {
      padding: 0 12px;
      height: 48px;
      border-radius: 12px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      color: #4b5563;
      font-size: 14px;
      white-space: nowrap;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .primary-btn {
      background: #7bd35f;
      color: #0f172a;
    }

    .primary-btn:hover {
      background: #70cb54;
    }

    .secondary-btn {
      background: #f3f4f6;
      color: #111827;
    }

    .secondary-btn:hover {
      background: #e8ebf0;
    }

    .danger-btn {
      background: #fee2e2;
      color: #991b1b;
    }

    .danger-btn:hover {
      background: #fecaca;
    }

    .edit-btn {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .edit-btn:hover {
      background: #bfdbfe;
    }

    .move-btn {
      background: #ecfccb;
      color: #3f6212;
    }

    .move-btn:hover {
      background: #d9f99d;
    }

    .hide-btn {
      background: #fef3c7;
      color: #92400e;
    }

    .hide-btn:hover {
      background: #fde68a;
    }

    .show-btn {
      background: #dcfce7;
      color: #166534;
    }

    .show-btn:hover {
      background: #bbf7d0;
    }

    .tag-help {
      font-size: 13px;
      color: #6b7280;
      margin-top: -4px;
      margin-bottom: 8px;
    }

    .tag-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .tag-input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2f7;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #dbe2ea;
      cursor: pointer;
      user-select: none;
    }

    .tag-pill.active {
      background: #7bd35f;
      border-color: #7bd35f;
      color: #0f172a;
    }

    .custom-tag-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .custom-tag-row input {
      flex: 1;
      min-width: 220px;
    }

    .selected-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 22px;
    }

    .selected-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f3f6fa;
      color: #4b5563;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .selected-tag button {
      padding: 0;
      border: none;
      background: transparent;
      color: #6b7280;
      font-size: 14px;
      cursor: pointer;
    }

    .list-wrap {
      max-height: 420px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 10px;
      background: #fafbfc;
      margin-bottom: 18px;
    }

    .item-list {
      display: grid;
      gap: 12px;
    }

    .item {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .item.hidden-item {
      opacity: 0.72;
      background: #f9fafb;
      border-style: dashed;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .item-meta {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    .status-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #fef3c7;
      color: #92400e;
    }

    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      background: #eef2f7;
      color: #4b5563;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .item-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .item-actions button {
      padding: 10px 12px;
      font-size: 13px;
      min-width: 86px;
    }

    textarea {
      min-height: 260px;
      resize: vertical;
      font-family: Menlo, Monaco, Consolas, monospace;
      line-height: 1.6;
    }

    .small-note {
      color: #6b7280;
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.7;
    }

    .empty {
      color: #9ca3af;
      font-size: 14px;
      padding: 12px 0;
    }

    .editing-banner {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid #fed7aa;
    }

    @media (max-width: 760px) {
      .item {
        flex-direction: column;
      }

      .item-actions {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .path-row {
        grid-template-columns: 1fr;
      }

      .path-prefix,
      .path-suffix {
        height: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>教学活动管理工具</h1>
    <div class="desc">
      这个版本会自动读取你当前的 <strong>data.json</strong>。<br>
      你只需要新增、编辑、调整顺序、隐藏，然后点击“生成完整 data.json”，最后复制结果覆盖原来的 <strong>data.json</strong> 即可。
    </div>

    <div class="section-title">新增 / 编辑活动</div>

    <div id="editingBanner" class="editing-banner"></div>

    <div class="form-grid">
      <input id="title" placeholder="活动名称（必填）">

      <input id="author" placeholder="作者（可不填）">

      <div class="path-row">
        <div class="path-prefix">tools/</div>
        <input id="pathBase" placeholder="只输入中间名字，例如：caihongzi">
        <div class="path-suffix">.html</div>
      </div>

      <div class="path-row">
        <div class="path-prefix">assets/</div>
        <input id="coverBase" placeholder="只输入中间名字，例如：caihongzi">
        <div class="path-suffix">.png</div>
      </div>
    </div>

    <div class="tag-input-wrap">
      <div class="tag-help">标签不用输入逗号。直接点下面标签，或者自己新增一个标签。</div>

      <div id="presetTags" class="tag-input-row"></div>

      <div class="custom-tag-row">
        <input id="customTagInput" placeholder="输入一个新标签，例如：词语">
        <button class="secondary-btn" type="button" onclick="addCustomTag()">添加标签</button>
      </div>

      <div id="selectedTags" class="selected-tags"></div>
    </div>

    <div class="button-row">
      <button class="primary-btn" onclick="saveItem()">保存活动</button>
      <button class="secondary-btn" onclick="generate()">生成完整 data.json</button>
      <button class="secondary-btn" onclick="copyOutput()">复制生成结果</button>
      <button class="danger-btn" onclick="clearForm()">清空输入框</button>
    </div>

    <div class="section-title">当前活动列表</div>
    <div class="list-wrap">
      <div id="list" class="item-list"></div>
      <div id="emptyState" class="empty" style="display:none;">当前还没有活动。</div>
    </div>

    <div class="section-title">生成结果</div>
    <textarea id="output" placeholder="点击“生成完整 data.json”后，这里会出现完整内容。"></textarea>
    <div class="small-note">
      用法：点击“生成完整 data.json” → 点击“复制生成结果” → 打开 data.json → 全部替换保存。
    </div>
  </div>

  <script>
    let items = [];
    let editingIndex = -1;
    let selectedTags = [];

    const presetTags = ["词汇", "语法", "汉字", "书写", "听力", "口语", "阅读", "游戏", "HSK1", "HSK2", "词语"];

    async function loadData() {
      try {
        const res = await fetch("data.json");
        const data = await res.json();
        items = Array.isArray(data) ? data : [];
      } catch (error) {
        console.error("读取 data.json 失败：", error);
        items = [];
      }

      renderPresetTags();
      renderSelectedTags();
      renderList();
    }

    function renderPresetTags() {
      const wrap = document.getElementById("presetTags");
      wrap.innerHTML = presetTags.map(tag => `
        <button
          type="button"
          class="tag-pill ${selectedTags.includes(tag) ? "active" : ""}"
          onclick="toggleTag('${escapeSingleQuotes(tag)}')"
        >
          ${tag}
        </button>
      `).join("");
    }

    function toggleTag(tag) {
      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
      } else {
        selectedTags.push(tag);
      }
      renderPresetTags();
      renderSelectedTags();
    }

    function renderSelectedTags() {
      const box = document.getElementById("selectedTags");

      if (!selectedTags.length) {
        box.innerHTML = `<span class="empty">暂未选择标签</span>`;
        return;
      }

      box.innerHTML = selectedTags.map(tag => `
        <span class="selected-tag">
          ${tag}
          <button type="button" onclick="removeSelectedTag('${escapeSingleQuotes(tag)}')">×</button>
        </span>
      `).join("");
    }

    function removeSelectedTag(tag) {
      selectedTags = selectedTags.filter(t => t !== tag);
      renderPresetTags();
      renderSelectedTags();
    }

    function addCustomTag() {
      const input = document.getElementById("customTagInput");
      const value = input.value.trim();

      if (!value) {
        alert("请先输入一个标签。");
        return;
      }

      if (!presetTags.includes(value)) {
        presetTags.push(value);
      }

      if (!selectedTags.includes(value)) {
        selectedTags.push(value);
      }

      input.value = "";
      renderPresetTags();
      renderSelectedTags();
    }

    function buildHtmlPath() {
      const base = document.getElementById("pathBase").value.trim();
      return base ? `tools/${base}.html` : "";
    }

    function buildCoverPath() {
      const base = document.getElementById("coverBase").value.trim();
      return base ? `assets/${base}.png` : "";
    }

    function saveItem() {
      const title = document.getElementById("title").value.trim();
      const author = document.getElementById("author").value.trim();
      const pathBase = document.getElementById("pathBase").value.trim();
      const coverBase = document.getElementById("coverBase").value.trim();

      if (!title || !pathBase || !coverBase) {
        alert("请先填写完整：活动名称、HTML中间名字、图片中间名字。");
        return;
      }

      if (selectedTags.length === 0) {
        alert("请至少选择一个标签。");
        return;
      }

      const obj = {
        title,
        path: buildHtmlPath(),
        cover: buildCoverPath(),
        tags: [...selectedTags]
      };

      if (author) {
        obj.author = author;
      }

      if (editingIndex >= 0) {
        const oldHidden = items[editingIndex]?.hidden === true;
        if (oldHidden) {
          obj.hidden = true;
        }
        items[editingIndex] = obj;
        alert("活动已更新。");
      } else {
        items.push(obj);
        alert("活动已添加到当前列表。");
      }

      renderList();
      clearForm();
    }

    function removeItem(index) {
      const confirmed = confirm("确定删除这个活动吗？删除后不会自动恢复。");
      if (!confirmed) return;

      items.splice(index, 1);

      if (editingIndex === index) {
        clearForm();
      } else if (editingIndex > index) {
        editingIndex -= 1;
      }

      renderList();
    }

    function toggleHidden(index) {
      items[index].hidden = items[index].hidden === true ? false : true;
      renderList();
    }

    function editItem(index) {
      const item = items[index];
      editingIndex = index;

      document.getElementById("title").value = item.title || "";
      document.getElementById("author").value = item.author || "";
      document.getElementById("pathBase").value = stripPath(item.path, "tools/", ".html");
      document.getElementById("coverBase").value = stripPath(item.cover, "assets/", ".png");
      selectedTags = Array.isArray(item.tags) ? [...item.tags] : [];

      selectedTags.forEach(tag => {
        if (!presetTags.includes(tag)) {
          presetTags.push(tag);
        }
      });

      renderPresetTags();
      renderSelectedTags();
      renderEditingBanner();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function moveUp(index) {
      if (index === 0) return;
      [items[index - 1], items[index]] = [items[index], items[index - 1]];

      if (editingIndex === index) editingIndex = index - 1;
      else if (editingIndex === index - 1) editingIndex = index;

      renderList();
    }

    function moveDown(index) {
      if (index === items.length - 1) return;
      [items[index + 1], items[index]] = [items[index], items[index + 1]];

      if (editingIndex === index) editingIndex = index + 1;
      else if (editingIndex === index + 1) editingIndex = index;

      renderList();
    }

    function renderEditingBanner() {
      const banner = document.getElementById("editingBanner");
      if (editingIndex >= 0) {
        banner.style.display = "block";
        banner.textContent = `正在编辑：${items[editingIndex]?.title || ""}`;
      } else {
        banner.style.display = "none";
        banner.textContent = "";
      }
    }

    function renderList() {
      const list = document.getElementById("list");
      const empty = document.getElementById("emptyState");

      if (!items.length) {
        list.innerHTML = "";
        empty.style.display = "block";
        renderEditingBanner();
        return;
      }

      empty.style.display = "none";

      list.innerHTML = items.map((item, index) => `
        <div class="item ${item.hidden ? 'hidden-item' : ''}">
          <div class="item-info">
            <div class="item-title">${item.title || ""}</div>
            <div class="item-meta">
              作者：${item.author || "未填写"}<br>
              HTML：${item.path || ""}<br>
              图片：${item.cover || ""}
            </div>
            ${item.hidden ? '<div class="status-badge">已隐藏，不在前台显示</div>' : ''}
            <div class="tag-row">
              ${(item.tags || []).map(tag => `<span class="tag">${tag}</span>`).join("")}
            </div>
          </div>

          <div class="item-actions">
            <button class="edit-btn" type="button" onclick="editItem(${index})">编辑</button>
            <button class="move-btn" type="button" onclick="moveUp(${index})">上移</button>
            <button class="move-btn" type="button" onclick="moveDown(${index})">下移</button>
            <button class="${item.hidden ? 'show-btn' : 'hide-btn'}" type="button" onclick="toggleHidden(${index})">
              ${item.hidden ? '取消隐藏' : '隐藏'}
            </button>
            <button class="danger-btn" type="button" onclick="removeItem(${index})">删除</button>
          </div>
        </div>
      `).join("");

      renderEditingBanner();
    }

    function generate() {
      const json = JSON.stringify(items, null, 2);
      document.getElementById("output").value = json;
      alert("已生成完整 data.json。");
    }

    async function copyOutput() {
      const output = document.getElementById("output").value.trim();

      if (!output) {
        alert("请先点击“生成完整 data.json”。");
        return;
      }

      try {
        await navigator.clipboard.writeText(output);
        alert("已复制。现在去覆盖原来的 data.json。");
      } catch (error) {
        const textarea = document.getElementById("output");
        textarea.select();
        document.execCommand("copy");
        alert("已复制。现在去覆盖原来的 data.json。");
      }
    }

    function clearForm() {
      editingIndex = -1;
      selectedTags = [];
      document.getElementById("title").value = "";
      document.getElementById("author").value = "";
      document.getElementById("pathBase").value = "";
      document.getElementById("coverBase").value = "";
      document.getElementById("customTagInput").value = "";
      renderPresetTags();
      renderSelectedTags();
      renderEditingBanner();
    }

    function stripPath(fullPath, prefix, suffix) {
      if (!fullPath) return "";
      let result = fullPath;

      if (result.startsWith(prefix)) {
        result = result.slice(prefix.length);
      }

      if (result.endsWith(suffix)) {
        result = result.slice(0, -suffix.length);
      }

      return result;
    }

    function escapeSingleQuotes(str) {
      return String(str).replace(/'/g, "\\'");
    }

    loadData();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>变速卡点：熊猫词语训练营</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            font-family: 'ZCOOL KuaiLe', cursive;
            background-color: #000;
            margin: 0;
            overflow: hidden;
            color: white;
            user-select: none;
        }

        .video-wrapper {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #game-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            width: 95vw;
            max-width: 900px;
            height: 45vh;
        }

        .word-box {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #fff;
            border-radius: 15px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.05s ease-out;
            opacity: 0.8; 
            padding: 10px;
        }

        .char-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .pinyin-text {
            font-size: clamp(0.8rem, 3.5vw, 1.8rem);
            margin-bottom: 0.2em;
            color: #000;
            font-family: sans-serif;
            text-transform: lowercase;
        }

        .kanji-text {
            font-size: clamp(1rem, 4vw, 2.2rem);
        }

        .active-hit {
            transform: scale(1.15);
            background: #fff;
            border-color: #ff0033;
            box-shadow: 0 0 50px #ff0033;
            opacity: 1;
            z-index: 20;
        }

        #ui-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(15px);
        }

        .input-style {
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            outline: none;
        }

        .speed-btn, .mode-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #555;
            padding: 6px 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            font-size: 0.7rem;
            line-height: 1.2;
        }

        .speed-btn.active, .mode-btn.active {
            background: #ff0033;
            border-color: #ff0033;
            box-shadow: 0 0 10px #ff0033;
        }

        .btn-start {
            background: linear-gradient(135deg, #ff0033, #aa0011);
            color: white;
            font-size: 1.1rem;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        #stop-btn {
            background: #333;
            color: #ccc;
            font-size: 1rem;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #444;
            display: none;
        }

        .status-badge {
            position: absolute;
            top: 10%;
            background: rgba(255,0,51,0.8);
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="v1" playsinline>
            <source src="1.mp4" type="video/mp4">
        </video>
        <video id="v2" playsinline style="display:none;">
            <source src="2.mp4" type="video/mp4">
        </video>
    </div>

    <div id="game-layer">
        <div id="badge" class="status-badge">准备中 Ready...</div>
        <div class="grid-container" id="grid"></div>
    </div>

    <div id="ui-panel">
        <div id="setup-controls" class="flex flex-col gap-3">
            <input type="text" id="words" class="input-style" placeholder="输入词语(逗号分隔) / Enter Words">
            
            <div class="flex flex-col gap-1">
                <span class="text-xs text-gray-400">选择模式 / Select Mode:</span>
                <div class="flex gap-2">
                    <div class="mode-btn active" data-mode="1">模式1<br>标准</div>
                    <div class="mode-btn" data-mode="2">模式2<br>随机</div>
                    <div class="mode-btn" data-mode="3">模式3<br>顺序</div>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <span class="text-xs text-gray-400">难度选择 / Difficulty Level:</span>
                <div class="flex gap-2">
                    <div class="speed-btn active" data-level="1">1档 (60s)<br>Level 1</div>
                    <div class="speed-btn" data-level="2">2档 (43s)<br>Level 2</div>
                    <div class="speed-btn" data-level="3">3档 (30s)<br>Level 3</div>
                </div>
            </div>

            <div class="flex justify-between items-center text-sm">
                <label>词卡重复次数 / Repeat Times:</label>
                <input type="number" id="loops" value="1" min="1" class="w-16 bg-transparent text-center border-b border-white">
            </div>
            <div id="start-btn" class="btn-start">开始挑战 START CHALLENGE</div>
        </div>
        
        <div id="stop-btn">停止挑战 STOP CHALLENGE</div>
    </div>

    <script>
        const { pinyin } = pinyinPro;

        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const gameLayer = document.getElementById('game-layer');
        const grid = document.getElementById('grid');
        const setupControls = document.getElementById('setup-controls');
        const stopBtn = document.getElementById('stop-btn');
        const badge = document.getElementById('badge');

        let wordList = [];
        let currentWordIndex = 0;
        let cycleCount = 0; 
        let targetLoops = 1;
        let isRunning = false;
        let selectedLevel = 1;
        let selectedMode = 1; 
        let rAFId = null;

        const VIDEO_TARGET_DURATIONS = { 1: 60, 2: 43, 3: 30 };
        const RHYTHM_CONFIGS = {
            1: { r1: { flash: 4.19, pause: 0, count: 8 }, r2: { flash: 0, pause: 5.29, count: 0 }, r3: { flash: 5.29, pause: 0, count: 8 }, r4: { flash: 0, pause: 5.29, count: 0 } },
            2: { r1: { flash: 3.09, pause: 0, count: 8 }, r2: { flash: 0, pause: 3.83, count: 0 }, r3: { flash: 3.83, pause: 0, count: 8 }, r4: { flash: 0, pause: 3.83, count: 0 } },
            3: { r1: { flash: 2.09, pause: 0, count: 8 }, r2: { flash: 0, pause: 2.59, count: 0 }, r3: { flash: 2.59, pause: 0, count: 8 }, r4: { flash: 0, pause: 2.59, count: 0 } }
        };

        // 绑定模式切换
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMode = parseInt(btn.dataset.mode);
            };
        });

        // 绑定难度切换
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedLevel = parseInt(btn.dataset.level);
            };
        });

        function createGrid() {
            grid.innerHTML = '';
            for(let i=0; i<8; i++) {
                const div = document.createElement('div');
                div.className = 'word-box';
                div.id = `box-${i}`;
                grid.appendChild(div);
            }
        }

        function getPinyinHtml(text) {
            if (!text) return '';
            const pyList = pinyin(text, { type: 'array' });
            let html = '';
            for (let i = 0; i < text.length; i++) {
                html += `<div class="char-unit"><div class="pinyin-text">${pyList[i]}</div><div class="kanji-text">${text[i]}</div></div>`;
            }
            return html;
        }

        async function startSession() {
            const rawWords = document.getElementById('words').value.trim();
            if (!rawWords) return;

            let baseWords = rawWords.split(/[,，]/).map(s => s.trim()).filter(s => s !== "");
            
            // 模式处理逻辑
            if (selectedMode === 1) {
                wordList = baseWords;
            } else if (selectedMode === 2) {
                wordList = baseWords.sort(() => Math.random() - 0.5);
            } else if (selectedMode === 3) {
                wordList = [baseWords]; 
            }

            targetLoops = parseInt(document.getElementById('loops').value) || 1;
            setupControls.style.display = 'none';
            stopBtn.style.display = 'block';
            isRunning = true;
            currentWordIndex = 0;
            cycleCount = 0;

            createGrid();
            v1.style.display = 'block';
            v2.style.display = 'none';
            
            try {
                v1.currentTime = 0;
                await v1.play();
            } catch(e) { console.error(e); }

            gameLayer.style.opacity = '1';
            badge.innerText = "准备开始 Ready...";
            v1.onended = () => { if(isRunning) enterLoopMode(); };
        }

        function enterLoopMode() {
            v1.style.display = 'none';
            v2.style.display = 'block';
            const originalDuration = v2.duration || 30; 
            v2.playbackRate = originalDuration / VIDEO_TARGET_DURATIONS[selectedLevel];
            v2.currentTime = 0;
            v2.play();
            v2.onended = () => { if (isRunning) { v2.currentTime = 0; v2.play(); } };
            startRhythmControl();
        }

        function startRhythmControl() {
            const config = RHYTHM_CONFIGS[selectedLevel];
            let startTime = performance.now();
            let currentRound = 1;

            function run() {
                if (!isRunning) return;
                const now = performance.now();
                const elapsed = (now - startTime) / 1000;
                let activeBoxIndex = -1;
                let roundConfig = config[`r${currentRound}`];
                let roundDuration = roundConfig.flash + roundConfig.pause;

                if (elapsed < roundDuration) {
                    if (roundConfig.count > 0) {
                        const step = roundConfig.flash / roundConfig.count;
                        activeBoxIndex = Math.floor(elapsed / step);
                        if (activeBoxIndex >= 8) activeBoxIndex = -1;
                    }
                } else {
                    if (currentRound === 1) currentRound = 2;
                    else if (currentRound === 2) currentRound = 3;
                    else if (currentRound === 3) { handleCycleEnd(); currentRound = 4; }
                    else if (currentRound === 4) currentRound = 3;
                    startTime = now;
                }
                updateUI(activeBoxIndex);
                rAFId = requestAnimationFrame(run);
            }
            rAFId = requestAnimationFrame(run);
        }

        function updateUI(boxIndex) {
            const boxes = document.querySelectorAll('.word-box');
            
            if (selectedMode === 3) {
                const pageWords = wordList[0]; 
                boxes.forEach((box, i) => {
                    const word = pageWords[i] || pageWords[i % pageWords.length] || "";
                    if (box.dataset.word !== word) {
                        box.innerHTML = getPinyinHtml(word);
                        box.dataset.word = word;
                    }
                    i === boxIndex ? box.classList.add('active-hit') : box.classList.remove('active-hit');
                });
                badge.innerText = `模式: 顺序 (${cycleCount + 1}/${targetLoops})`;
            } else if (selectedMode === 2) {
                const currentWord = wordList[currentWordIndex];
                const pinyinHtml = getPinyinHtml(currentWord);
                boxes.forEach((box, i) => {
                    if (box.dataset.word !== currentWord) {
                        box.innerHTML = pinyinHtml;
                        box.dataset.word = currentWord;
                    }
                    i === boxIndex ? box.classList.add('active-hit') : box.classList.remove('active-hit');
                });
                badge.innerText = `模式: 随机序列 - ${currentWord} (${cycleCount + 1}/${targetLoops})`;
            } else {
                const currentWord = wordList[currentWordIndex];
                const pinyinHtml = getPinyinHtml(currentWord);
                boxes.forEach((box, i) => {
                    if (box.dataset.word !== currentWord) {
                        box.innerHTML = pinyinHtml;
                        box.dataset.word = currentWord;
                    }
                    i === boxIndex ? box.classList.add('active-hit') : box.classList.remove('active-hit');
                });
                badge.innerText = `词语: ${currentWord} (${cycleCount + 1}/${targetLoops})`;
            }
        }

        function handleCycleEnd() {
            cycleCount++;
            if (cycleCount >= targetLoops) {
                cycleCount = 0;
                if (selectedMode === 3) {
                    finishGame("练习完成 DONE!", true);
                } else {
                    currentWordIndex++;
                    if (currentWordIndex >= wordList.length) finishGame("练习完成 DONE!", true);
                }
            }
        }

        function stopSession() { finishGame("练习结束 END", false); }

        function finishGame(message, isSuccess) {
            isRunning = false;
            cancelAnimationFrame(rAFId);
            v1.pause(); v2.pause();
            v1.style.display = 'block'; v2.style.display = 'none';
            gameLayer.style.opacity = '0';
            setupControls.style.display = 'flex';
            stopBtn.style.display = 'none';

            if(isSuccess) {
                const msg = new SpeechSynthesisUtterance("Good job!");
                msg.lang = 'en-US';
                window.speechSynthesis.speak(msg);
                new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3').play().catch(e=>{});
            }

            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 flex items-center justify-center z-[200] bg-black/90";
            overlay.innerHTML = `<div class="text-center p-12 bg-white rounded-3xl shadow-2xl">
                <h2 class="text-6xl font-black mb-8 text-red-600">${message}</h2>
                <button id="back-home" class="bg-red-600 text-white text-2xl px-16 py-4 rounded-full font-bold">完成 OK</button>
            </div>`;
            document.body.appendChild(overlay);
            document.getElementById('back-home').onclick = () => overlay.remove();
        }

        document.getElementById('start-btn').onclick = startSession;
        stopBtn.onclick = stopSession;
        window.onload = createGrid;
    </script>
</body>
</html>

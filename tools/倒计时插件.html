<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时小插件 - Mac 优化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'SF Pro Display', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .timer-font {
            font-family: 'JetBrains+Mono', monospace;
        }

        .urgent {
            color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
        }

        /* 针对 Mac 优化的美观输入框 */
        .time-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #60a5fa;
            width: 90px;
            text-align: center;
            border-radius: 14px;
            padding: 10px 0;
            font-size: 1.75rem;
            font-weight: bold;
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            appearance: none;
            -moz-appearance: textfield;
        }
        .time-input::-webkit-outer-spin-button,
        .time-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .time-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
            transform: scale(1.05);
        }

        #pipCanvas {
            display: none;
        }

        .btn-hover {
            transition: all 0.3s ease;
        }
        .btn-hover:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="glass-card p-10 text-center w-full max-w-lg mx-4">
        <div class="flex justify-between items-center mb-8">
            <div class="text-left">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">课堂工具</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Classroom Timer Pro</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleFullScreen()" class="btn-hover flex items-center gap-1 text-xs bg-slate-700/50 px-4 py-2 rounded-full text-slate-300 transition">
                    全屏
                </button>
                <button onclick="enterPipMode()" class="btn-hover flex items-center gap-1 text-xs bg-blue-600/40 px-4 py-2 rounded-full text-blue-200 border border-blue-500/30 transition">
                    开启浮窗
                </button>
            </div>
        </div>
        
        <!-- Timer Display -->
        <div id="display" class="timer-font text-8xl md:text-9xl font-bold mb-8 tracking-tighter transition-colors duration-300 drop-shadow-2xl">
            05:00
        </div>

        <!-- Manual Input Area -->
        <div class="flex justify-center items-center gap-4 mb-10 text-slate-400">
            <div class="flex flex-col items-center">
                <input type="number" id="minInput" value="5" min="0" max="999" class="time-input" oninput="syncManualTime()" onfocus="this.select()">
                <span class="text-[10px] font-bold mt-2 uppercase tracking-widest text-slate-500">分钟</span>
            </div>
            <span class="text-4xl font-light text-slate-600">:</span>
            <div class="flex flex-col items-center">
                <input type="number" id="secInput" value="0" min="0" max="59" class="time-input" oninput="syncManualTime()" onfocus="this.select()">
                <span class="text-[10px] font-bold mt-2 uppercase tracking-widest text-slate-500">秒钟</span>
            </div>
        </div>

        <!-- Preset Buttons -->
        <div class="grid grid-cols-4 gap-3 mb-10">
            <button onclick="setTime(60)" class="btn-hover bg-slate-800/50 hover:bg-slate-700 py-3 rounded-2xl text-sm font-medium transition">1 分</button>
            <button onclick="setTime(180)" class="btn-hover bg-slate-800/50 hover:bg-slate-700 py-3 rounded-2xl text-sm font-medium transition">3 分</button>
            <button onclick="setTime(300)" class="btn-hover bg-slate-800/50 hover:bg-slate-700 py-3 rounded-2xl text-sm font-medium transition">5 分</button>
            <button onclick="setTime(600)" class="btn-hover bg-slate-800/50 hover:bg-slate-700 py-3 rounded-2xl text-sm font-medium transition">10 分</button>
        </div>

        <!-- Main Controls -->
        <div class="flex items-center justify-center gap-10">
            <button onclick="resetTimer()" title="重置" class="btn-hover p-5 rounded-full bg-slate-800/80 text-slate-400 hover:text-white transition shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 256 256"><path d="M224,128a96,96,0,0,1-94.58,96H128A95.93,95.93,0,0,1,34.05,110.15a8,8,0,1,1,15.56,3.7A80,80,0,1,0,128,48a79.22,79.22,0,0,0-53.77,20.67L89.6,84A8,8,0,0,1,84,96H32a8,8,0,0,1-8-8V32a8,8,0,0,1,13.66-5.66L53.4,41.9A96,96,0,0,1,224,128Z"></path></svg>
            </button>
            
            <button onclick="toggleTimer()" class="group relative">
                <div class="absolute inset-0 bg-blue-500 rounded-full blur-2xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <div id="startStopIcon" class="relative bg-blue-500 hover:bg-blue-400 p-8 rounded-full text-white transition-all transform shadow-2xl active:scale-95">
                    <svg id="playSvg" xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 256 256"><path d="M240,128a15.74,15.74,0,0,1-7.6,13.51L88.32,229.75a16,16,0,0,1-24.2-13.62V40a16,16,0,0,1-24.2-13.75l144.08,88.24A15.74,15.74,0,0,1,240,128Z"></path></svg>
                    <svg id="pauseSvg" class="hidden" xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 256 256"><path d="M216,48V208a16,16,0,0,1-16,16H160a16,16,0,0,1-16-16V48a16,16,0,0,1,16-16h40A16,16,0,0,1,216,48ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Z"></path></svg>
                </div>
            </button>

            <button onclick="toggleMute()" class="btn-hover p-5 rounded-full bg-slate-800/80 text-slate-400 hover:text-white transition shadow-lg">
                <svg id="unmutedIcon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 256 256"><path d="M155.51,24.81a8,8,0,0,0-8.42.88L77.25,80H32A16,16,0,0,0,16,96v64a16,16,0,0,0,16,16H77.25l69.84,54.31A8,8,0,0,0,160,224V32A8,8,0,0,0,155.51,24.81ZM144,204.49,84.75,158.31A8,8,0,0,0,79.83,156H32V100H79.83a8,8,0,0,0,4.92-1.71L144,51.51ZM224,128a40,40,0,0,1-40,40,8,8,0,0,1,0-16,24,24,0,0,0,0-48,8,8,0,0,1,0-16A40,40,0,0,1,224,128Z"></path></svg>
                <svg id="mutedIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 256 256"><path d="M213.66,101.66l-29.66,29.66,29.66,29.66a8,8,0,0,1-11.32,11.32L172.69,142.63l-29.66,29.66a8,8,0,0,1-11.32-11.32l29.66-29.66L142.63,113.6a8,8,0,0,1,11.32-11.32l29.66,29.66,29.66-29.66a8,8,0,0,1,11.32,11.32ZM128,32V224a8,8,0,0,1-12.83,6.31L45.33,176H16a16,16,0,0,1-16-16V96A16,16,0,0,1,16,80H45.33l69.84-54.31A8,8,0,0,1,128,32Zm-16,19.51L52.17,96H16v64H52.17l59.83,44.49Z"></path></svg>
            </button>
        </div>
    </div>

    <video id="pipVideo" autoplay muted playsinline class="hidden"></video>
    <canvas id="pipCanvas" width="300" height="150"></canvas>

    <script>
        let timeLeft = 300;
        let originalTime = 300;
        let timerId = null;
        let isMuted = false;

        const display = document.getElementById('display');
        const minInput = document.getElementById('minInput');
        const secInput = document.getElementById('secInput');
        const playSvg = document.getElementById('playSvg');
        const pauseSvg = document.getElementById('pauseSvg');
        const mutedIcon = document.getElementById('mutedIcon');
        const unmutedIcon = document.getElementById('unmutedIcon');
        
        const canvas = document.getElementById('pipCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('pipVideo');

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const timeStr = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            display.innerText = timeStr;
            
            if (!timerId) {
                minInput.value = mins;
                secInput.value = secs;
            }

            if (timeLeft <= 10 && timeLeft > 0) {
                display.classList.add('urgent');
            } else {
                display.classList.remove('urgent');
            }
            
            drawCanvas(timeStr);
        }

        function syncManualTime() {
            if (timerId) clearInterval(timerId);
            timerId = null;
            playSvg.classList.remove('hidden');
            pauseSvg.classList.add('hidden');
            
            const m = parseInt(minInput.value) || 0;
            const s = parseInt(secInput.value) || 0;
            timeLeft = m * 60 + s;
            originalTime = timeLeft;
            updateDisplay();
        }

        function drawCanvas(text) {
            ctx.fillStyle = '#1e293b';
            if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(0, 0, 300, 150, 20);
                ctx.fill();
            } else {
                ctx.fillRect(0, 0, 300, 150);
            }

            ctx.fillStyle = timeLeft <= 10 && timeLeft > 0 ? '#ef4444' : '#60a5fa';
            ctx.font = 'bold 85px Courier New, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        }

        async function enterPipMode() {
            try {
                const stream = canvas.captureStream();
                video.srcObject = stream;
                await video.play();
                await video.requestPictureInPicture();
            } catch (error) {
                alert("Mac 老师请注意：请务必使用 Chrome 或 Edge 浏览器以支持悬浮窗。");
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function toggleTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                playSvg.classList.remove('hidden');
                pauseSvg.classList.add('hidden');
            } else {
                if (timeLeft <= 0) resetTimer();
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    }
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        timerId = null;
                        playSvg.classList.remove('hidden');
                        pauseSvg.classList.add('hidden');
                        announceFinish();
                    }
                }, 1000);
                playSvg.classList.add('hidden');
                pauseSvg.classList.remove('hidden');
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = originalTime;
            updateDisplay();
            playSvg.classList.remove('hidden');
            pauseSvg.classList.add('hidden');
        }

        function setTime(seconds) {
            clearInterval(timerId);
            timerId = null;
            timeLeft = seconds;
            originalTime = seconds;
            updateDisplay();
            playSvg.classList.remove('hidden');
            pauseSvg.classList.add('hidden');
        }

        function toggleMute() {
            isMuted = !isMuted;
            mutedIcon.classList.toggle('hidden');
            unmutedIcon.classList.toggle('hidden');
        }

        function announceFinish() {
            if (isMuted) return;
            const msg = new SpeechSynthesisUtterance("Time is up");
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        updateDisplay();
    </script>
</body>
</html>
